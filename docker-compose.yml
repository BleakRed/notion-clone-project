services:
  db:
    image: postgres:16-alpine
    container_name: notion-db
    restart: always
    environment:
      - POSTGRES_USER=notion_user
      - POSTGRES_PASSWORD=notion_pass
      - POSTGRES_DB=notion_clone
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion_user -d notion_clone"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: notion-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql://notion_user:notion_pass@db:5432/notion_clone?schema=public}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:8000}
    container_name: notion-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
